# Tên của workflow
name: Deploy Spring Boot and React App

# Trigger: Chạy workflow này khi có push lên nhánh main
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    # Sử dụng máy ảo Ubuntu mới nhất để chạy job
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Checkout code từ repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Cài đặt JDK 17 (bạn có thể thay đổi phiên bản)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Bước 3: Cài đặt Node.js 18 (bạn có thể thay đổi phiên bản)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      # Bước 4: Build ứng dụng React
      - name: Build React Frontend
        # Di chuyển vào thư mục frontend và chạy npm install & npm run build
        run: |
          cd frontend
          npm install
          npm run build

      # Bước 5: Copy file build của React vào thư mục static của Spring Boot
      - name: Copy frontend build to Spring Boot static folder
        run: cp -r frontend/build/. backend/src/main/resources/static/
      
      # Bước 6: Build ứng dụng Spring Boot với Maven để tạo file JAR
      - name: Build Spring Boot Backend with Maven
        # Di chuyển vào thư mục backend và chạy lệnh package của Maven
        # Lệnh -DskipTests để bỏ qua việc chạy test, giúp build nhanh hơn
        run: |
          cd backend
          mvn clean package -DskipTests
      
      # Bước 7: Deploy file JAR lên server qua SSH
      - name: Deploy to Server
        # Sử dụng một action có sẵn để thực hiện SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}         # IP hoặc domain của server
          username: ${{ secrets.SERVER_USERNAME }} # Tên đăng nhập server
          key: ${{ secrets.SSH_PRIVATE_KEY }}      # Khóa SSH private để đăng nhập
          port: 22                               # Port SSH (thường là 22)
          script: |
            # Dừng ứng dụng cũ nếu đang chạy
            pkill -f 'my-app-.*.jar' || true
            
            # Copy file JAR từ runner của GitHub Actions đến server
            # LƯU Ý: Điều chỉnh đường dẫn đến file JAR của bạn
            scp -o StrictHostKeyChecking=no backend/target/*.jar ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }}:/home/${{ secrets.SERVER_USERNAME }}/my-app.jar

            # Chạy ứng dụng với file JAR mới
            nohup java -jar /home/${{ secrets.SERVER_USERNAME }}/my-app.jar > app.log 2>&1 &
